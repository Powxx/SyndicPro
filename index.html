<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>SyndicPro</title>
<style>
:root {
  --bg:#0f1117; --surface:#171b26; --surface2:#1e2433; --surface3:#252c3d;
  --border:#2d3548; --accent:#4f8ef7; --gold:#c9a84c;
  --green:#2ecc71; --red:#e74c3c; --orange:#f39c12;
  --text:#e8eaf0; --text2:#8892a4; --text3:#5a6478;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);}
body{display:flex;flex-direction:column;}

#topbar{position:fixed;top:0;left:0;right:0;z-index:40;background:var(--surface);border-bottom:1px solid var(--border);height:52px;display:flex;align-items:center;padding:0 14px;gap:10px;}
#topbar-logo{font-size:17px;font-weight:800;color:var(--gold);white-space:nowrap;}
#topbar-page{flex:1;font-size:13px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#menu-btn{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 13px;font-size:18px;cursor:pointer;flex-shrink:0;}

#layout{display:flex;flex:1;margin-top:52px;margin-bottom:60px;}
#sidebar{width:220px;min-width:220px;background:var(--surface);border-right:1px solid var(--border);overflow-y:auto;height:calc(100vh - 52px);position:sticky;top:52px;display:none;}
.nav-sec{padding:10px 14px 3px;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--text3);}
.nav-item{display:flex;align-items:center;gap:9px;padding:10px 16px;cursor:pointer;font-size:13px;color:var(--text2);border-left:2px solid transparent;user-select:none;}
.nav-item:hover{background:var(--surface2);color:var(--text);}
.nav-item.active{color:var(--accent);border-left-color:var(--accent);background:rgba(79,142,247,.1);}

#main{flex:1;overflow-y:auto;padding:14px;}

#botnav{position:fixed;bottom:0;left:0;right:0;z-index:40;background:var(--surface);border-top:1px solid var(--border);display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;padding:4px;}
#botnav::-webkit-scrollbar{display:none;}
.bn{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;padding:5px 10px;border-radius:8px;cursor:pointer;font-size:9px;color:var(--text3);min-width:52px;border:none;background:transparent;user-select:none;}
.bn .bi{font-size:20px;line-height:1.3;}
.bn.active{color:var(--accent);}
.bn:active{opacity:.6;}

#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:50;}
#overlay.open{display:block;}
#drawer{position:fixed;top:0;right:0;bottom:0;width:268px;z-index:60;background:var(--surface);overflow-y:auto;transform:translateX(100%);transition:transform .22s ease;border-left:1px solid var(--border);}
#drawer.open{transform:translateX(0);}
.dr-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.dr-close{background:none;border:none;color:var(--text2);font-size:24px;cursor:pointer;padding:4px 8px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:12px;}
.card-title{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);margin-bottom:10px;}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:13px 15px;margin-bottom:10px;}
.kpi-label{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);}
.kpi-value{font-size:22px;font-weight:700;margin-top:4px;}
.kpi-sub{font-size:11px;color:var(--text3);margin-top:2px;}
.kv-g{color:var(--green);} .kv-r{color:var(--red);} .kv-o{color:var(--gold);} .kv-b{color:var(--accent);}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

.tw{overflow-x:auto;border-radius:8px;border:1px solid var(--border);margin-top:8px;}
table{width:100%;border-collapse:collapse;font-size:12px;min-width:460px;}
th{background:var(--surface2);padding:8px 11px;text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);border-bottom:1px solid var(--border);}
td{padding:9px 11px;border-bottom:1px solid var(--border);color:var(--text2);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,.02);}

.badge{display:inline-block;padding:2px 7px;border-radius:20px;font-size:10px;font-weight:600;text-transform:uppercase;}
.bg{background:rgba(46,204,113,.15);color:var(--green);}
.br{background:rgba(231,76,60,.15);color:var(--red);}
.bo{background:rgba(243,156,18,.15);color:var(--orange);}
.bb{background:rgba(79,142,247,.15);color:var(--accent);}
.bpp{background:rgba(124,92,191,.15);color:#9b7de0;}

.fg{margin-bottom:11px;}
.fl{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:4px;}
.fc{width:100%;padding:10px 12px;background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:15px;font-family:inherit;outline:none;}
.fc:focus{border-color:var(--accent);}
textarea.fc{resize:vertical;}

.btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 15px;border-radius:8px;border:none;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500;min-height:40px;user-select:none;}
.btn:active{opacity:.7;}
.pb{background:var(--accent);color:#fff;}
.sb{background:var(--surface2);color:var(--text2);border:1px solid var(--border);}
.gb{background:var(--gold);color:#000;}
.db{background:var(--red);color:#fff;}
.eb{background:var(--surface3);color:var(--text);border:1px solid var(--border);}
.sm{padding:6px 11px;font-size:12px;min-height:34px;}
.sa{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px;}

#mwrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:80;align-items:flex-end;justify-content:center;}
#mwrap.open{display:flex;}
#mbox{background:var(--surface);border:1px solid var(--border);border-radius:16px 16px 0 0;padding:18px 15px;width:100%;max-width:560px;max-height:86vh;overflow-y:auto;}
.mt{font-size:17px;font-weight:700;color:var(--gold);margin-bottom:14px;}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:14px;padding-top:11px;border-top:1px solid var(--border);}

.alert{padding:11px 13px;border-radius:8px;font-size:13px;margin-bottom:10px;line-height:1.4;}
.aw{background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.3);color:var(--orange);}
.ai{background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.3);color:var(--accent);}
.as{background:rgba(46,204,113,.1);border:1px solid rgba(46,204,113,.3);color:var(--green);}
.ad{background:rgba(231,76,60,.1);border:1px solid rgba(231,76,60,.3);color:var(--red);}

.sep{height:1px;background:var(--border);margin:11px 0;}
.row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.bet{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.ml{display:inline-block;padding:1px 6px;background:var(--surface3);border-radius:4px;color:var(--gold);font-size:11px;font-weight:600;}

#toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);z-index:90;display:none;pointer-events:none;}
.ti{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 17px;font-size:13px;box-shadow:0 4px 20px rgba(0,0,0,.5);white-space:nowrap;}

.act-btns{display:flex;gap:4px;}

@media(min-width:700px){
  #layout{margin-bottom:0;}
  #sidebar{display:block;}
  #botnav{display:none;}
  #menu-btn{display:none;}
  #mbox{border-radius:12px;margin:auto;}
  #mwrap{align-items:center;}
  #main{padding:20px 22px;}
}
</style>
</head>
<body>

<div id="topbar">
  <div id="topbar-logo">SyndicPro</div>
  <div id="topbar-page">Tableau de bord</div>
  <button id="menu-btn" onclick="toggleDr()">☰</button>
</div>

<div id="overlay" onclick="toggleDr()"></div>
<div id="drawer">
  <div class="dr-head">
    <span style="color:var(--gold);font-weight:700">Menu</span>
    <button class="dr-close" onclick="toggleDr()">✕</button>
  </div>
  <div id="dr-nav"></div>
</div>

<div id="layout">
  <div id="sidebar"><div id="sb-nav"></div></div>
  <div id="main"></div>
</div>

<nav id="botnav"></nav>
<div id="mwrap" onclick="bgClose(event)"><div id="mbox"></div></div>
<div id="toast"><div class="ti" id="tmsg"></div></div>

<script type="module">
  const expose = (obj) => Object.entries(obj).forEach(([k,v]) => window[k] = v);

  expose({
  mAddFourn, mEditFourn, saveFourn, updateFourn, delFourn,
  mAddLot, mEditLot, mAddPoste, mEditPoste,
  mAddOp, mEditOp,
  mNewAG,mAddCat,saveCat,delCat
});
// ══════════════════════════════════════════
//  DATA — MODIFIEZ CES VALEURS POUR VOTRE RÉSIDENCE
// ══════════════════════════════════════════
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const _app = initializeApp({
  apiKey: "AIzaSyCEorAKbtrp3NNjpRB28Wmik5GI8RmE7Hk",
  authDomain: "syndicpro-ee271.firebaseapp.com",
  projectId: "syndicpro-ee271",
  storageBucket: "syndicpro-ee271.firebasestorage.app",
  messagingSenderId: "894224824604",
  appId: "1:894224824604:web:0dd85535398907226fe2d9"
});
const _db = getFirestore(_app);
const _DOC = doc(_db, 'syndicpro', 'data');
let _saving = false;

const DEFAULTS = {
  imm:{
    nom:"Nom de votre résidence",
    adr:"Adresse complète, Code postal Ville",
    siret:"",
    banque:"",
    iban:"",
    milli:10000,
    annee:new Date().getFullYear()
  },
  milles:[
  {id:'gen',nom:'Millièmes généraux'},
  {id:'ch',nom:'Charges communes'},
  {id:'as',nom:'Charges Ascenseur'},
  {id:'ps',nom:'Charges parking'},
  {id:'pa',nom:'Charges Particulière'},
],
  lots:[],
  cats:['Entretien','Équipements','Assurances','Administration','Eau','Travaux','Divers'],
  postes:[],
  treso:[],
  ags:[],
  votes:[],
  incidents:[],
  fourns:[],
  contrats:[],
  travaux:[],
  docs:[],
  nid:100
};

// ── PERSISTENCE localStorage ──
async function loadData(){
  try {
    const timeout = new Promise((_,rej) => setTimeout(()=>rej(new Error('timeout')), 5000));
    const snap = await Promise.race([getDoc(_DOC), timeout]);
    if(snap.exists()) return snap.data();
  } catch(e){ console.warn('Firebase indisponible', e); }
  return JSON.parse(JSON.stringify(DEFAULTS));
}
async function saveData(){
  if(_saving) return;
  _saving = true;
  try { await setDoc(_DOC, S); }
  catch(e){ toast('⚠️ Erreur sauvegarde cloud'); }
  finally { _saving = false; }
}
function resetData(){
  if(confirm('⚠️ Effacer TOUTES les données ?')){
    Object.assign(S, JSON.parse(JSON.stringify(DEFAULTS)));
    saveData().then(()=>location.reload());
  }
}
function exportData(){
  const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='syndicpro_sauvegarde_'+today()+'.json';a.click();
  toast('✅ Sauvegarde exportée');
}
function importData(){
  const input=document.createElement('input');input.type='file';input.accept='.json';
  input.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        Object.assign(S,d);saveData();toast('✅ Données importées');go(CUR);
      }catch{toast('❌ Fichier invalide');}
    };r.readAsText(f);
  };input.click();
}

let S = JSON.parse(JSON.stringify(DEFAULTS));
document.getElementById('main').innerHTML = '<div style="padding:40px;text-align:center;color:var(--text2)">⏳ Chargement...</div>';

// ── HELPERS ──
function eur(n){return new Intl.NumberFormat('fr-FR',{style:'currency',currency:'EUR'}).format(n||0);}
function uid(){ S.nid++; return S.nid; }
function v(id){const e=document.getElementById(id);return e?e.value:'';}
function today(){return new Date().toISOString().split('T')[0];}
function sumMilli(id){
  return S.lots.reduce((a,l)=>a+(l.milli?.[id]||0),0);
}
function sumBudget(){return S.postes.reduce((a,p)=>a+p.mont,0);}
function cmg(){return S.postes.filter(p=>p.rep==='mg').reduce((a,p)=>a+p.mont,0);}
function cmc(){return S.postes.filter(p=>p.rep==='mc').reduce((a,p)=>a+p.mont,0);}
function solde(){
  const r=S.treso.filter(t=>t.type==='recette'&&t.stat==='payé').reduce((a,t)=>a+t.mont,0);
  const d=S.treso.filter(t=>t.type==='dépense'&&t.stat==='payé').reduce((a,t)=>a+t.mont,0);
  return r-d;
}
function impayes(){return S.treso.filter(t=>t.type==='recette'&&t.stat==='en attente').reduce((a,t)=>a+t.mont,0);}
function etage(e){return e===0?'RDC':e<0?'Sous-sol':e+'e';}
function esc(s){return String(s||'').replace(/'/g,"\\'")}

// ── NAV ──
const MENU=[
  {id:'home',ico:'🏛️',lab:'Accueil',sec:''},
  {id:'lots',ico:'🏢',lab:'Lots',sec:'Copropriété'},
  {id:'copros',ico:'👥',lab:'Copropriétaires',sec:''},
  {id:'fourns',ico:'🔧',lab:'Fournisseurs',sec:''},
  {id:'budget',ico:'📊',lab:'Budget',sec:'Comptabilité'},
  {id:'charges',ico:'📋',lab:'Répartition',sec:''},
  {id:'treso',ico:'💶',lab:'Trésorerie',sec:''},
  {id:'appels',ico:'📨',lab:'Appels fonds',sec:''},
  {id:'impayes',ico:'⚠️',lab:'Impayés',sec:''},
  {id:'ag',ico:'🗳️',lab:'AG',sec:'Assemblée Générale'},
  {id:'pv',ico:'📄',lab:'PV',sec:''},
  {id:'votes',ico:'✅',lab:'Votes',sec:''},
  {id:'travaux',ico:'🔨',lab:'Travaux',sec:'Gestion'},
  {id:'docs',ico:'🗂️',lab:'Documents',sec:''},
  {id:'contrats',ico:'📝',lab:'Contrats',sec:''},
  {id:'incidents',ico:'🚨',lab:'Incidents',sec:''},
  {id:'immeuble',ico:'⚙️',lab:'Paramètres',sec:''},
];
const BN_IDS=['home','lots','budget','treso','impayes','ag','incidents'];
let CUR='';

function buildNav(){
  const mkItem=(m,pfx)=>`<div class="nav-item" id="${pfx}${m.id}" onclick="go('${m.id}')">${m.ico} ${m.lab}</div>`;
  ['sb-nav','dr-nav'].forEach(nid=>{
    let h='';
    MENU.forEach(m=>{if(m.sec)h+=`<div class="nav-sec">${m.sec}</div>`;h+=mkItem(m,nid+'-');});
    document.getElementById(nid).innerHTML=h;
  });
  document.getElementById('botnav').innerHTML=BN_IDS.map(id=>{
    const m=MENU.find(x=>x.id===id);
    return `<button class="bn" id="bn-${id}" onclick="go('${id}')"><span class="bi">${m.ico}</span>${m.lab}</button>`;
  }).join('');
}

function go(page){
  CUR=page;
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  ['sb-nav','dr-nav'].forEach(n=>{const e=document.getElementById(n+'-'+page);if(e)e.classList.add('active');});
  document.querySelectorAll('.bn').forEach(e=>e.classList.remove('active'));
  const bn=document.getElementById('bn-'+page);if(bn)bn.classList.add('active');
  const m=MENU.find(x=>x.id===page);
  document.getElementById('topbar-page').textContent=m?m.ico+' '+m.lab:'';
  const fns={home:pgHome,lots:pgLots,copros:pgCopros,fourns:pgFourns,budget:pgBudget,
    charges:pgCharges,treso:pgTreso,appels:pgAppels,impayes:pgImpayes,
    ag:pgAG,pv:pgPV,votes:pgVotes,travaux:pgTravaux,docs:pgDocs,
    contrats:pgContrats,incidents:pgIncidents,immeuble:pgImmeuble};
  document.getElementById('main').innerHTML='';
  if(fns[page])fns[page]();
  closeDr();
  document.getElementById('main').scrollTop=0;
}

function toggleDr(){
  document.getElementById('drawer').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeDr(){
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
function openM(h){document.getElementById('mbox').innerHTML=h;document.getElementById('mwrap').classList.add('open');}
function closeM(){document.getElementById('mwrap').classList.remove('open');}
function bgClose(e){if(e.target===document.getElementById('mwrap'))closeM();}
let TT;
function toast(msg){
  clearTimeout(TT);
  document.getElementById('tmsg').textContent=msg;
  document.getElementById('toast').style.display='block';
  TT=setTimeout(()=>document.getElementById('toast').style.display='none',2600);
}

// ══════════════════════════════════════════
//  PAGE ACCUEIL
// ══════════════════════════════════════════
function pgHome(){
  const sd=solde(),imp=impayes(),bt=sumBudget();
  const ag=S.ags.find(a=>a.stat==='planifiée');
  const al=S.contrats.filter(c=>c.alerte);
  const ouv=S.incidents.filter(i=>i.stat==='ouvert');
  document.getElementById('main').innerHTML=`
    <div style="margin-bottom:10px;font-size:13px;color:var(--text3)">📌 ${S.imm.nom}</div>
    <div class="g2">
      <div class="kpi"><div class="kpi-label">Solde trésorerie</div><div class="kpi-value ${sd>=0?'kv-g':'kv-r'}">${eur(sd)}</div></div>
      <div class="kpi"><div class="kpi-label">Budget ${S.imm.annee}</div><div class="kpi-value kv-o">${eur(bt)}</div></div>
      <div class="kpi"><div class="kpi-label">Impayés</div><div class="kpi-value ${imp>0?'kv-r':'kv-g'}">${eur(imp)}</div></div>
      <div class="kpi"><div class="kpi-label">Prochaine AG</div><div class="kpi-value kv-b" style="font-size:16px">${ag?ag.date.split('-').reverse().join('/'):'—'}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Alertes</div>
      ${al.map(c=>`<div class="alert aw">⚠️ Contrat "${c.type}" à renouveler</div>`).join('')}
      ${ouv.length?`<div class="alert ad">🚨 ${ouv.length} incident(s) ouvert(s)</div>`:''}
      ${S.travaux.some(t=>t.urgence)?`<div class="alert ad">⚡ Travaux urgents en cours</div>`:''}
      ${!al.length&&!ouv.length&&!S.travaux.some(t=>t.urgence)?`<div class="alert as">✅ Aucune alerte critique</div>`:''}
    </div>
    ${S.treso.length?`<div class="card">
      <div class="card-title">Dernières opérations</div>
      ${[...S.treso].reverse().slice(0,6).map(t=>`
        <div class="bet" style="padding:8px 0;border-bottom:1px solid var(--border)">
          <div><div style="font-size:13px">${t.lib}</div><div style="font-size:10px;color:var(--text3)">${t.date}</div></div>
          <div style="font-weight:700;color:${t.type==='recette'?'var(--green)':'var(--red)'}">
            ${t.type==='recette'?'+':'−'}${eur(t.mont)}</div>
        </div>`).join('')}
    </div>`:''}
    <div class="card">
      <div class="g2">
        <div><div style="font-size:28px;font-weight:700;color:var(--accent)">${S.lots.length}</div><div style="font-size:11px;color:var(--text3)">Lots</div></div>
        <div><div style="font-size:26px;font-weight:700;color:var(--gold)">${sumMilli().toLocaleString('fr')}</div><div style="font-size:11px;color:var(--text3)">Millièmes totaux</div></div>
      </div>
      <div class="sep"></div>
      <div style="font-size:12px;color:var(--text2)">${S.imm.adr}</div>
    </div>
    <div class="card">
      <div class="card-title">Gestion des données</div>
      <div class="row">
        <button class="btn sb sm" onclick="exportData()">💾 Exporter JSON</button>
        <button class="btn sb sm" onclick="importData()">📂 Importer JSON</button>
        <button class="btn db sm" onclick="resetData()">🗑 Réinitialiser</button>
      </div>
    </div>`;
}

// ══════════════════════════════════════════
//  LOTS
// ══════════════════════════════════════════
function pgLots(){
  document.getElementById('main').innerHTML=`
    <div class="sa"><button class="btn pb" onclick="mAddLot()">+ Lot</button></div>
    <div class="g2">
      <div class="kpi"><div class="kpi-label">Total lots</div><div class="kpi-value kv-b">${S.lots.length}</div></div>
      <div class="kpi"><div class="kpi-label">Millièmes généraux</div><div class="kpi-value kv-o" style="font-size:17px">${sumMilli('gen').toLocaleString('fr')} / ${S.imm.milli.toLocaleString('fr')}</div></div>
    </div>
    ${!S.lots.length?`<div class="alert ai">Aucun lot enregistré. Cliquez "+ Lot" pour commencer.</div>`:`

// ══════════════════════════════════════════
function pgAG(){
  document.getElementById('main').innerHTML=`
    <div class="sa"><button class="btn pb" onclick="mNewAG()">+ Organiser AG</button></div>
    ${!S.ags.length?`<div class="alert ai">Aucune AG planifiée. Cliquez "+ Organiser AG".</div>`:''}
    ${S.ags.map(ag=>`<div class="card">
      <div class="bet">
        <div>
          <div style="font-size:15px;font-weight:700">${ag.type} — ${ag.date.split('-').reverse().join('/')}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:2px">🕐 ${ag.heure} · 📍 ${ag.lieu}</div>
        </div>
        <span class="badge ${ag.stat==='planifiée'?'bo':ag.stat==='tenue'?'bg':'bb'}">${ag.stat}</span>
      </div>
      <div class="sep"></div>
      <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--text3);margin-bottom:6px">Ordre du jour</div>
      ${ag.odj.map((o,i)=>`<div style="padding:5px 0;border-bottom:1px solid var(--border);font-size:13px"><span style="color:var(--text3);margin-right:8px">${i+1}.</span>${o}</div>`).join('')}
      <div class="row" style="margin-top:10px">
        ${ag.stat==='planifiée'?`<button class="btn pb sm" onclick="mConduireAG(${ag.id})">🗳️ Conduire</button>`:''}
        ${ag.stat==='tenue'?`<button class="btn gb sm" onclick="genPV(${ag.id})">📄 ${ag.pv?'Voir PV':'Générer PV'}</button>`:''}
        <button class="btn eb sm" onclick="mEditAG(${ag.id})">✏️ Modifier</button>
        <button class="btn db sm" onclick="delAG(${ag.id})">🗑</button>
      </div>
    </div>`).join('')}`;
}

function mNewAG(){
  openM(`<div class="mt">Organiser une AG</div>
    <div class="g2">
      <div class="fg"><label class="fl">Type</label><select class="fc" id="m-type"><option>AGO</option><option>AGE</option></select></div>
      <div class="fg"><label class="fl">Date</label><input class="fc" id="m-date" type="date"></div>
      <div class="fg"><label class="fl">Heure</label><input class="fc" id="m-heure" value="18h00"></div>
      <div class="fg"><label class="fl">Lieu</label><input class="fc" id="m-lieu" placeholder="Salle, adresse..."></div>
    </div>
    <div class="fg"><label class="fl">Ordre du jour (1 point par ligne)</label>
      <textarea class="fc" id="m-odj" rows="4" placeholder="Approbation des comptes\nBudget\nQuestions diverses"></textarea></div>
    <div class="mf"><button class="btn sb" onclick="closeM()">Annuler</button><button class="btn pb" onclick="saveAG()">Planifier</button></div>`);
}
function saveAG(){
  S.ags.push({id:uid(),type:v('m-type'),date:v('m-date'),heure:v('m-heure'),lieu:v('m-lieu'),stat:'planifiée',odj:v('m-odj').split('\n').filter(Boolean),quorum:false,pv:false});
  saveData();closeM();toast('✅ AG planifiée');go('ag');
}
function mEditAG(id){
  const ag=S.ags.find(x=>x.id===id);
  openM(`<div class="mt">Modifier l'AG</div>
    <div class="g2">
      <div class="fg"><label class="fl">Type</label><select class="fc" id="m-type">
        <option${ag.type==='AGO'?' selected':''}>AGO</option><option${ag.type==='AGE'?' selected':''}>AGE</option>
      </select></div>
      <div class="fg"><label class="fl">Date</label><input class="fc" id="m-date" type="date" value="${ag.date}"></div>
      <div class="fg"><label class="fl">Heure</label><input class="fc" id="m-heure" value="${esc(ag.heure)}"></div>
      <div class="fg"><label class="fl">Lieu</label><input class="fc" id="m-lieu" value="${esc(ag.lieu)}"></div>
    </div>
    <div class="fg"><label class="fl">Ordre du jour</label>
      <textarea class="fc" id="m-odj" rows="4">${ag.odj.join('\n')}</textarea></div>
    <div class="mf"><button class="btn sb" onclick="closeM()">Annuler</button><button class="btn pb" onclick="updateAG(${id})">Enregistrer</button></div>`);
}
function updateAG(id){
  const ag=S.ags.find(x=>x.id===id);
  Object.assign(ag,{type:v('m-type'),date:v('m-date'),heure:v('m-heure'),lieu:v('m-lieu'),odj:v('m-odj').split('\n').filter(Boolean)});
  saveData();closeM();toast('✅ AG modifiée');go('ag');
}
function delAG(id){
  if(confirm('Supprimer cette AG ?')){
    S.ags=S.ags.filter(x=>x.id!==id);
    S.votes=S.votes.filter(v=>v.agId!==id);
    saveData();toast('🗑 AG supprimée');go('ag');
  }
}
function mConduireAG(id){
  openM(`<div class="mt">Conduire l'AG</div>
    <div class="fg"><label class="fl">Quorum atteint ?</label><select class="fc" id="m-qr"><option value="true">Oui ✅</option><option value="false">Non ❌</option></select></div>
    <div class="fg"><label class="fl">Millièmes représentés</label><input class="fc" id="m-milli" type="number" placeholder="Ex: 6500"></div>
    <div class="mf"><button class="btn sb" onclick="closeM()">Annuler</button><button class="btn gb" onclick="valAG(${id})">Valider la tenue</button></div>`);
}
function valAG(id){
  const ag=S.ags.find(a=>a.id===id);
  ag.stat='tenue';ag.quorum=v('m-qr')==='true';
  saveData();closeM();toast('✅ AG enregistrée');go('ag');
}

// ══════════════════════════════════════════
//  PV & VOTES
// ══════════════════════════════════════════
function pgPV(){
  const list=S.ags.filter(a=>a.stat==='tenue');
  document.getElementById('main').innerHTML=
    (!list.length?`<div class="alert ai">Aucune AG tenue pour l'instant.</div>`:'')+
    list.map(ag=>`<div class="card">
      <div class="bet">
        <div>
          <div style="font-weight:700">${ag.type} du ${ag.date.split('-').reverse().join('/')}</div>
          <div style="font-size:12px;color:var(--text3)">${ag.lieu}</div>
        </div>
        <button class="btn gb sm" onclick="genPV(${ag.id})">📄 PV</button>
      </div>
    </div>`).join('');
}

function pgVotes(){
  document.getElementById('main').innerHTML=`
    <div class="sa"><button class="btn pb" onclick="mAddVote()">+ Vote</button></div>
    ${!S.votes.length?`<div class="alert ai">Aucun vote enregistré.</div>`:`
    <div class="card">
      <div class="tw"><table>
        <thead><tr><th>AG</th><th>Résolution</th><th>Art.</th><th>Pour</th><th>Contre</th><th>Abst.</th><th>Résultat</th><th></th></tr></thead>
        <tbody>${S.votes.map(vt=>{
          const ag=S.ags.find(a=>a.id===vt.agId);
          return `<tr>
            <td style="font-size:11px">${ag?ag.date.split('-').reverse().join('/'):vt.agId}</td>
            <td style="font-size:12px">${vt.res}</td>
            <td><span class="badge bpp">${vt.art}</span></td>
            <td style="color:var(--green)">${vt.pour.toLocaleString('fr')}</td>
            <td style="color:var(--red)">${vt.contre.toLocaleString('fr')}</td>
            <td style="color:var(--text3)">${vt.abst.toLocaleString('fr')}</td>
            <td><span class="badge ${vt.res2==='adopté'?'bg':'br'}">${vt.res2}</span></td>
            <td><div class="act-btns">
              <button class="btn eb sm" onclick="mEditVote(${vt.id})">✏️</button>
              <button class="btn db sm" onclick="delVote(${vt.id})">🗑</button>
            </div></td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`}`;
}

function mAddVote(){
  const tenues=S.ags.filter(a=>a.stat==='tenue');
  openM(`<div class="mt">Ajouter un vote</div>
    <div class="fg"><label class="fl">AG</label><select class="fc" id="m-agid">
      ${tenues.map(a=>`<option value="${a.id}">${a.type} du ${a.date.split('-').reverse().join('/')}</option>`).join('')}
    </select></div>
    <div class="fg"><label class="fl">Résolution</label><input class="fc" id="m-res" placeholder="Approbation des comptes..."></div>
    <div class="fg"><label class="fl">Article</label><input class="fc" id="m-art" placeholder="Art. 24"></div>
    <div class="g2">
      <div class="fg"><label class="fl">Pour (millièmes)</label><input class="fc" id="m-pour" type="number" placeholder="0"></div>
      <div class="fg"><label class="fl">Contre</label><input class="fc" id="m-contre" type="number" placeholder="0"></div>
      <div class="fg"><label class="fl">Abstention</label><input class="fc" id="m-abst" type="number" placeholder="0"></div>
      <div class="fg"><label class="fl">Résultat</label><select class="fc" id="m-res2"><option>adopté</option><option>rejeté</option></select></div>
    </div>
    <div class="mf"><button class="btn sb" onclick="closeM()">Annuler</button><button class="btn pb" onclick="saveVote()">Enregistrer</button></div>`);
}
function saveVote(){
  S.votes.push({id:uid(),agId:+v('m-agid'),res:v('m-res'),art:v('m-art'),pour:+v('m-pour'),contre:+v('m-contre'),abst:+v('m-abst'),res2:v('m-res2')});
  saveData();closeM();toast('✅ Vote enregistré');go('votes');
}
function mEditVote(id){
  const vt=S.votes.find(x=>x.id===id);
  const tenues=S.ags.filter(a=>a.stat==='tenue');
  openM(`<div class="mt">Modifier le vote</div>
    <div class="fg"><label class="fl">AG</label><select class="fc" id="m-agid">
      ${tenues.map(a=>`<option value="${a.id}"${a.id===vt.agId?' selected':''}>${a.type} du ${a.date.split('-').reverse().join('/')}</option>`).join('')}
    </select></div>
    <div class="fg"><label class="fl">Résolution</label><input class="fc" id="m-res" value="${esc(vt.res)}"></div>
    <div class="fg"><label class="fl">Article</label><input class="fc" id="m-art" value="${esc(vt.art)}"></div>
    <div class="g2">
      <div class="fg"><label class="fl">Pour</label><input class="fc" id="m-pour" type="number" value="${vt.pour}"></div>
      <div class="fg"><label class="fl">Contre</label><input class="fc" id="m-contre" type="number" value="${vt.contre}"></div>
      <div class="fg"><label class="fl">Abstention</label><input class="fc" id="m-abst" type="number" value="${vt.abst}"></div>
      <div class="fg"><label class="fl">Résultat</label><select class="fc" id="m-res2">
        <option${vt.res2==='adopté'?' selected':''}>adopté</option>
        <option${vt.res2==='rejeté'?' selected':''}>rejeté</option>
      </select></div>
    </div>
    <div class="mf"><button class="btn sb" onclick="closeM()">Annuler</button><button class="btn pb" onclick="updateVote(${id})">Enregistrer</button></div>`);
}
function updateVote(id){
  const vt=S.votes.find(x=>x.id===id);
  Object.assign(vt,{agId:+v('m-agid'),res:v('m-res'),art:v('m-art'),pour:+v('m-pour'),contre:+v('m-contre'),abst:+v('m-abst'),res2:v('m-res2')});
  saveData();closeM();toast('✅ Vote modifié');go('votes');
}
function delVote(id){
  if(confirm('Supprimer ce vote ?')){S.votes=S.votes.filter(x=>x.id!==id);saveData();toast('🗑 Supprimé');go('votes');}
}

// ══════════════════════════════════════════
//  TRAVAUX
// ══════════════════════════════════════════
function pgTravaux(){
  const ss=['devis reçu','validé','en cours','terminé'];
  document.getElementById('main').innerHTML=`
    <div class="sa"><button class="btn pb" onclick="mAddTravaux()">+ Chantier</button></div>
    ${S.travaux.some(t=>t.urgence)?`<div class="alert ad">⚡ Travaux urgents en cours</div>`:''}
    ${!S.travaux.length?`<div class="alert ai">Aucun chantier enregistré.</div>`:`
    <div class="card">
      <div class="tw"><table>
        <thead><tr><th>Libellé</th><th>Fournisseur</th><th>Montant</th><th>Statut</th><th></th></tr></thead>
        <tbody>${S.travaux.map(t=>`<tr>
          <td style="font-weight:500">${t.lib}${t.urgence?' ⚡':''}</td>
          <td style="font-size:12px">${t.fourn}</td>
          <td style="color:var(--gold)">${eur(t.mont)}</td>
          <td><span class="badge ${t.stat==='terminé'?'bg':t.stat==='en cours'?'bb':'bo'}">${t.stat}</span></td>
          <td><div class="act-btns">
            ${t.stat!=='terminé'?`<button class="btn sb sm" onclick="nextTravaux(${t.id})">→</button>`:''}
            <button class="btn eb sm" onclick="mEditTravaux(${t.id})">✏️</button>
            <button class="btn db sm" onclick="delTravaux(${t.id})">🗑</button>
          </div></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`}`;
}

function mAddTravaux(){
  openM(`<div class="mt">Ajouter un chantier</div>
    <div class="fg"><label class="fl">Libellé</label><input class="fc" id="m-lib" placeholder="Description des travaux"></div>
    <div class="fg"><label class="fl">Fournisseur / Entreprise</label><input class="fc" id="m-fourn" placeholder="Nom de l'entreprise"></div>
    <div class="g2">
      <div class="fg"><label class="fl">Montant devis (€)</label><input class="fc" id="m-mont" type="number" placeholder="0"></div>
      <div class="fg"><label class="fl">Urgence</label><select class="fc" id="m-urg"><option value="false">Non</option><option value="true">Oui ⚡</option></select></div>
    </div>
    <div class="mf"><button class="btn sb" onclick="closeM()">Annuler</button><button class="btn pb" onclick="saveTravaux()">Enregistrer</button></div>`);
}
function saveTravaux(){
  S.travaux.push({id:uid(),lib:v('m-lib'),stat:'devis reçu',mont:+v('m-mont'),fourn:v('m-fourn'),urgence:v('m-urg')==='true'});
  saveData();closeM();toast('✅ Chantier ajouté');go('travaux');
}
function mEditTravaux(id){
  const t=S.travaux.find(x=>x.id===id);
  const ss=['devis reçu','validé','en cours','terminé'];
  openM(`<div class="mt">Modifier le chantier</div>
    <div class="fg"><label class="fl">Libellé</label><input class="fc" id="m-lib" value="${esc(t.lib)}"></div>
    <div class="fg"><label class="fl">Fournisseur</label><input class="fc" id="m-fourn" value="${esc(t.fourn)}"></div>
    <div class="g2">
      <div class="fg"><label class="fl">Montant (€)</label><input class="fc" id="m-mont" type="number" value="${t.mont}"></div>
      <div class="fg"><label class="fl">Statut</label><select class="fc" id="m-stat">
        ${ss.map(s=>`<option${s===t.stat?' selected':''}>${s}</option>`).join('')}
      </select></div>
    </div>
    <div class="fg"><label class="fl">Urgence</label><select class="fc" id="m-urg">
      <option value="false"${!t.urgence?' selected':''}>Non</option>
      <option value="true"${t.urgence?' selected':''}>Oui ⚡</option>
    </select></div>
    <div class="mf"><button class="btn sb" onclick="closeM()">Annuler</button><button class="btn pb" onclick="updateTravaux(${id})">Enregistrer</button></div>`);
}
function updateTravaux(id){
  const t=S.travaux.find(x=>x.id===id);
  Object.assign(t,{lib:v('m-lib'),fourn:v('m-fourn'),mont:+v('m-mont'),stat:v('m-stat'),urgence:v('m-urg')==='true'});
  saveData();closeM();toast('✅ Chantier modifié');go('travaux');
}
function nextTravaux(id){
  const t=S.travaux.find(x=>x.id===id);
  const ss=['devis reçu','validé','en cours','terminé'];
  const idx=ss.indexOf(t.stat);
  if(idx<ss.length-1){t.stat=ss[idx+1];saveData();toast('✅ Statut mis à jour');go('travaux');}
}
function delTravaux(id){
  if(confirm('Supprimer ce chantier ?')){S.travaux=S.travaux.filter(x=>x.id!==id);saveData();toast('🗑 Supprimé');go('travaux');}
}

function pgDocs(){
  document.getElementById('main').innerHTML=`
    <div class="sa"><button class="btn pb" onclick="mAddDoc()">+ Document</button></div>
    ${!S.docs.length?`<div class="alert ai">Aucun document enregistré. Ajoutez vos documents de référence (règlement, diagnostics, PV…).</div>`:`
    <div class="card">
      <div class="card-title">Espace documentaire</div>
      ${S.docs.map(d=>`<div class="bet" style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div><div style="font-size:13px">📄 ${d.nom}</div>
          <div style="font-size:10px;color:var(--text3)">${d.date} · <span class="badge bb">${d.type}</span></div>
          ${d.notes?`<div style="font-size:11px;color:var(--text3);margin-top:2px;font-style:italic">${d.notes}</div>`:''}
        </div>
        <div class="act-btns">
          <button class="btn eb sm" onclick="mEditDoc(${d.id})">✏️</button>
          <button class="btn db sm" onclick="delDoc(${d.id})">🗑</button>
        </div>
      </div>`).join('')}
    </div>`}`;
}

function mAddDoc(){
  openM(`<div class="mt">Ajouter un document</div>
    <div class="fg"><label class="fl">Nom du document</label><input class="fc" id="m-nom" placeholder="Ex: Règlement de copropriété"></div>
    <div class="g2">
      <div class="fg"><label class="fl">Type</label><select class="fc" id="m-type"><option>Légal</option><option>Diagnostic</option><option>Comptabilité</option><option>AG</option><option>Gestion</option><option>Contrat</option><option>Autre</option></select></div>
      <div class="fg"><label class="fl">Date</label><input class="fc" id="m-date" type="date" value="${today()}"></div>
    </div>
    <div class="fg"><label class="fl">Notes / URL</label><input class="fc" id="m-notes" placeholder="Lien, remarques..."></div>
    <div class="mf"><button class="btn sb" onclick="closeM()">Annuler</button><button class="btn pb" onclick="saveDoc()">Enregistrer</button></div>`);
}
function saveDoc(){
  S.docs.push({id:uid(),nom:v('m-nom'),type:v('m-type'),date:v('m-date'),notes:v('m-notes')});
  saveData();closeM();toast('✅ Document ajouté');go('docs');
}
function mEditDoc(id){
  const d=S.docs.find(x=>x.id===id);
  const types=['Légal','Diagnostic','Comptabilité','AG','Gestion','Contrat','Autre'];
  openM(`<div class="mt">Modifier le document</div>
    <div class="fg"><label class="fl">Nom</label><input class="fc" id="m-nom" value="${esc(d.nom)}"></div>
    <div class="g2">
      <div class="fg"><label class="fl">Type</label><select class="fc" id="m-type">
        ${types.map(t=>`<option${t===d.type?' selected':''}>${t}</option>`).join('')}
      </select></div>
      <div class="fg"><label class="fl">Date</label><input class="fc" id="m-date" type="date" value="${d.date}"></div>
    </div>
    <div class="fg"><label class="fl">Notes / URL</label><input class="fc" id="m-notes" value="${esc(d.notes||'')}"></div>
    <div class="mf"><button class="btn sb" onclick="closeM()">Annuler</button><button class="btn pb" onclick="updateDoc(${id})">Enregistrer</button></div>`);
}
function updateDoc(id){
  const d=S.docs.find(x=>x.id===id);
  Object.assign(d,{nom:v('m-nom'),type:v('m-type'),date:v('m-date'),notes:v('m-notes')});
  saveData();closeM();toast('✅ Document modifié');go('docs');
}
function delDoc(id){
  if(confirm('Supprimer ce document ?')){S.docs=S.docs.filter(x=>x.id!==id);saveData();toast('🗑 Supprimé');go('docs');}
}

    ${S.contrats.filter(c=>c.alerte).map(c=>`<div class="alert aw">⚠️ "${c.type}" à renouveler avant le ${c.fin}</div>`).join('')}
    ${!S.contrats.length?`<div class="alert ai">Aucun contrat enregistré.</div>`:`
    <div class="card">
      <div class="tw"><table>
        <thead><tr><th>Type</th><th>Fournisseur</th><th>Début</th><th>Fin</th><th>Montant/an</th><th>Statut</th><th></th></tr></thead>
        <tbody>${S.contrats.map(c=>`<tr>
          <td style="font-weight:500">${c.type}</td>
          <td style="font-size:12px">${c.fourn}</td>
          <td style="font-size:11px">${c.deb}</td>
          <td style="font-size:11px">${c.fin}</td>
          <td style="color:var(--gold)">${eur(c.mont)}</td>
          <td><span class="badge ${c.stat==='actif'?'bg':'bo'}">${c.stat}</span></td>
          <td><div class="act-btns">
            <button class="btn eb sm" onclick="mEditContrat(${c.id})">✏️</button>
            <button class="btn db sm" onclick="delContrat(${c.id})">🗑</button>
          </div></td>
        </tr>`).join('')}</tbody>
      </table></div>
    </div>`}`;
}

function mAddContrat(){
  openM(`<div class="mt">Ajouter un contrat</div>
    <div class="fg"><label class="fl">Type de contrat</label><input class="fc" id="m-type" placeholder="Ex: Entretien ascenseur"></div>
    <div class="fg"><label class="fl">Fournisseur</label><input class="fc" id="m-fourn" placeholder="Nom de l'entreprise"></div>
    <div class="g2">
      <div class="fg"><label class="fl">Début</label><input class="fc" id="m-deb" type="date"></div>
      <div class="fg"><label class="fl">Fin</label><input class="fc" id="m-fin" type="date"></div>
    </div>
    <div class="g2">
      <div class="fg"><label class="fl">Montant annuel (€)</label><input class="fc" id="m-mont" type="number" placeholder="0"></div>
      <div class="fg"><label class="fl">Alerte renouvellement</label><select class="fc" id="m-alerte"><option value="false">Non</option><option value="true">Oui ⚠️</option></select></div>
    </div>
    <div class="mf"><button class="btn sb" onclick="closeM()">Annuler</button><button class="btn pb" onclick="saveContrat()">Enregistrer</button></div>`);
}
function saveContrat(){

function saveInc(){
  S.incidents.push({id:uid(),date:v('m-date'),lot:v('m-lot'),type:v('m-type'),desc:v('m-desc'),stat:'ouvert',prio:v('m-prio')});
  saveData();closeM();toast('✅ Incident signalé');go('incidents');
}
function mEditInc(id){
  const i=S.incidents.find(x=>x.id===id);
  const ss=['ouvert','en cours','résolu'];
  const prios=['faible','moyenne','haute'];
  const types=['Fuite','Éclairage','Voisinage','Équipement','Sécurité','Autre'];
  openM(`<div class="mt">Modifier l'incident</div>
    <div class="g2">
      <div class="fg"><label class="fl">Date</label><input class="fc" id="m-date" type="date" value="${i.date}"></div>
      <div class="fg"><label class="fl">Lot / Zone</label><input class="fc" id="m-lot" value="${esc(i.lot)}"></div>
      <div class="fg"><label class="fl">Type</label><select class="fc" id="m-type">
        ${types.map(t=>`<option${t===i.type?' selected':''}>${t}</option>`).join('')}
      </select></div>
      <div class="fg"><label class="fl">Priorité</label><select class="fc" id="m-prio">
        ${prios.map(p=>`<option value="${p}"${p===i.prio?' selected':''}>${p.charAt(0).toUpperCase()+p.slice(1)}</option>`).join('')}
      </select></div>
    </div>
    <div class="fg"><label class="fl">Description</label><textarea class="fc" id="m-desc" rows="3">${i.desc}</textarea></div>
    <div class="fg"><label class="fl">Statut</label><select class="fc" id="m-stat">
      ${ss.map(s=>`<option${s===i.stat?' selected':''}>${s}</option>`).join('')}
    </select></div>
    <div class="mf"><button class="btn sb" onclick="closeM()">Annuler</button><button class="btn pb" onclick="updateInc(${id})">Enregistrer</button></div>`);
}
function updateInc(id){
  const i=S.incidents.find(x=>x.id===id);
  Object.assign(i,{date:v('m-date'),lot:v('m-lot'),type:v('m-type'),desc:v('m-desc'),prio:v('m-prio'),stat:v('m-stat')});
  saveData();closeM();toast('✅ Incident modifié');go('incidents');
}
function nextInc(id){
  const i=S.incidents.find(x=>x.id===id);
  const ss=['ouvert','en cours','résolu'];
  const idx=ss.indexOf(i.stat);
  if(idx<ss.length-1){i.stat=ss[idx+1];saveData();toast('✅ Statut mis à jour');go('incidents');}
}
function delInc(id){
  if(confirm('Supprimer cet incident ?')){S.incidents=S.incidents.filter(x=>x.id!==id);saveData();toast('🗑 Supprimé');go('incidents');}
}
